<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Portal</title>
    <link rel="stylesheet" href= "style.css">
</head>
<body>
    <header>
        <h1>Job Portal</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search jobs...">
            <button id="searchBtn">Search</button>
        </div>
    </header>

    <main>
        <div class="job-listings" id="jobListings">
            <!-- Jobs will be dynamically added here -->
        </div>
    </main>

    <!-- Job Detail Modal -->
    <div id="jobModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle"></h2>
            <p><strong>Company:</strong> <span id="modalCompany"></span></p>
            <p><strong>Location:</strong> <span id="modalLocation"></span></p>
            <p><strong>Salary:</strong> <span id="modalSalary"></span></p>
            <p><strong>Description:</strong></p>
            <p id="modalDescription"></p>
            <button id="applyBtn">Apply Now</button>
        </div>
    </div>

    <!-- Apply Form Modal -->
    <div id="applyModal" class="modal">
        <div class="modal-content">
            <span class="close-apply">&times;</span>
            <h2>Apply for Job</h2>
            <form id="applyForm">
                <input type="text" id="applicantName" placeholder="Your Name" required>
                <input type="email" id="applicantEmail" placeholder="Your Email" required>
                <textarea id="applicantMessage" placeholder="Cover Letter" rows="4"></textarea>
                <button type="submit">Submit Application</button>
            </form>
        </div>
    </div>


    <script src="index.js"></script>
</body>
</html>
